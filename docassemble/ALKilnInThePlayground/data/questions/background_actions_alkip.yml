event: tests.action.cancel
need:
  - kip_vars_path
  - save_kip_runtime_vars
  - _debug
code: |
  _debug("💡 ALKiP INFO: Cancelling tests")
  tests.action.phase = 'cancelled'
  tests.ui.cancelled = True
  save_kip_runtime_vars({ tests.action.cancel_key: True }, kip_vars_path )
---
event: fail_tests_action
need:
  - _debug
code: |
  # Discuss: Make a custom error action for non-idempotency
  fail_tests_action_msg = f"""
  { action_argument("error_type") } { action_argument("error_message") }: { action_argument("error_trace") }
  Docassemble was looking for these variables:
  { action_argument("variables") }
  """
  _debug( fail_tests_action_msg )
  # I think `.failed()` will be True. Test this :(
  background_response({
    "ok": False,
    "repeated": False,
    "interrupted": False,
    "logs": [ fail_tests_action_msg ],
  })
