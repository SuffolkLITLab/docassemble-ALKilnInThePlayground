event: run_alkiln
# TODO: Put some logs under _debug or _add_and_debug.
need:
  - _add_and_log
  - worker_log_link
  - has_started_tests  # TODO: Replace with .action.did_start
  - tests.action.cancel_key
  - tests.action.task_data
  - tests.ui.description
  - env_vars  # Use external custom_env_vars here?
  - sources
  - run_process_with_canceler
code: |
  from docassemble.webapp.files import SavedFile

  background_error_action("fail_tests_action")
  # Re-reproduce with new v: With a shortened timeout, when the process times out chrome closes, but node doesn't for ~50 sec more. Less than the full test, but still seems long.

  # ------------- Guard the action -------------

  # `if` statement for idempotency - ensure tests are only run once
  # TODO: Stop subprocess if already running. Operations are synchronous, but The Loop isn't. Basically, set cancel and we may need to add another flag.
  if has_started_tests:
    _add_and_log(
      tests.action.task_data['logs'],
      [f"""🔎 ALKiP WARNING: Tried to re-run the { tests.ui.description } task. Docassemble was seeking `{ current_context().variable }`. Your { worker_log_link } may have more info."""]
    )
    background_response({
      'ok': False,
      'repeated': True,
      'interrupted': tests.action.task_data.get('interrupted', False),
      'logs': tests.action.task_data.get('logs', []),
    })

  # ------------- Setup -------------
  
  # Ensure that files in the 'sources' folder of all projects are
  # cached in /tmp for S3 and such server configurations so that
  # alkiln can get them there. They should be there for 2hrs at least.
  # It's not possible to just pick one project.
  # From https://github.com/SuffolkLITLab/docassemble-ALDashboard/blob/main/docassemble/ALDashboard/create_package.py#L14-L17
  SavedFile(user_info().id, fix=True, section='playgroundsources')

  sources_arg = f'--sources={ sources }'
  _add_and_log( tests.action.task_data['logs'], f"""💡 ALKiP INFO: sources path: { sources }""")

  tags = action_argument('tag_expression')
  kip_session_path = action_argument('kip_session_path')

  # `.communicate()` `timeout` is in seconds
  # 60 seconds * 60 minutes * 6 hours
  timeout_env_var_name = 'ALKILN_MAX_SECONDS_FOR_PLAYGROUND_TEST_RUN'
  # Discuss: Is it possible to do this without `env_vars` nicely?
  max_seconds = env_vars.get(
    timeout_env_var_name,
    60 * 60 * 6
  )
  max_seconds = float( max_seconds )

  # Make sure not to pass an empty string for tags as that results in
  # a "@" with no value after it in ALKiln.
  if tags != '':
    to_run = ['/var/www/.npm-global/bin/alkiln-run', tags, sources_arg]
  else:
    to_run = ['/var/www/.npm-global/bin/alkiln-run', sources_arg]

  # Prepare the environment variables
  custom_env_vars = dict(
    SERVER_URL=f'{url_of("root", _external=True)}',
    _ORIGIN='playground',
    _ALKILN_ORIGIN='playground',
    _PROJECT_NAME=action_argument('project_name'),
    _ALKILN_PROJECT_NAME=action_argument('project_name'),
    _USER_ID=f'{user_info().id}',
    _ALKILN_USER_ID=f'{user_info().id}',
    _TAGS=action_argument('tag_expression'),
    # Only need these in GitHub
    REPO_URL="X",
    BRANCH_NAME="X",
    DOCASSEMBLE_DEVELOPER_API_KEY="X"
  )
  
  # ------------- Run tests -------------
  
  # Ensure tests don't re-run, even (especially) if they error
  has_started_tests = True
  tests_process_data = {}
    
  try:
    tests_process_data = run_process_with_canceler(
      to_run,
      cancel_key=tests.action.cancel_key,
      json_path=kip_session_path,
      descriptor="ALKiln tests",
      custom_env_vars=custom_env_vars,
      max_seconds=max_seconds,
      timeout_env_var_name=timeout_env_var_name
    )
    _debug(f"""💡 ALKiP INFO: Finished running ALKiln tests""")
    tests.action.task_data['logs'].extend( tests_process_data.get('logs', []) )

  except Exception as tests_process_error:
    general_err_log = f"""🤕 ALKiP ERROR ALKP0010: ALKilnInThePlayground ran into an error
    when it was trying to run ALKiln tests. This is different than
    interview tests failing. Look above for more details and check
    your { worker_log_link }."""
    _add_and_log( tests.action.task_data['logs'], [ format_error( tests_process_error ), general_err_log ])

  tests.action.task_data['ok'] = tests_process_data.get('ok', False)
  tests.action.task_data['interrupted'] = tests_process_data.get('interrupted', False)
  
  background_response( tests.action.task_data )
