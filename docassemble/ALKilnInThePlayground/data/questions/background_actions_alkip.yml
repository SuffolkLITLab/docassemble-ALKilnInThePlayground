# ##################################
# NPM connection
# ##################################
# Note: no canceling
---
# Unique wrapper: Dynamic (npm connection)
---
id: try to connect to npm
need:
  - npm.action.phase
code: |
  if not npm.action.phase in ('failed', 'succeeded', 'canceled'):
    npm.action.run
---
id: npm connection task
code: |
  npm.action.task = background_action('check_npm_connection')
---
# Background action: Logic (npm connection)
id: npm connection action
event: check_npm_connection
need:
  - _add_and_log
  - _log
  - format_error
  - wrap_text
  - worker_log_link
  - npm.action.did_start
  - npm.action.task_data
  - npm.ui.description
  - try_to_connect
code: |
  # ------------- Failure fallback -------------
  background_error_action("fail_npm_action")

  # ------------- Default values -------------
  npm_general_err_log = wrap_text( f"""🤕 ALKiP ERROR: ALKilnInThePlayground ran into an error when it was trying to check the connection to the servers that store ALKiln. Look above for more details and check your { worker_log_link }.""")

  # ------------- Guard the action -------------
  if npm.action.did_start:

    _add_and_log( npm.action.task_data['logs'], [ wrap_text( f"""🔎 ALKiP WARNING: Tried to re-run the { npm.ui.description } task. Docassemble was seeking `{ current_context().variable }`. Your { worker_log_link } may have more info.""") ])
    npm.action.task_data['ok'] = False
    npm.action.task_data['repeated'] = True
    background_response( npm.action.task_data )
  
  npm.action.did_start = True

  # ------------- Run -------------
  try:
    # { 'ok': False, 'logs': [], 'pre_logs_msg': '' }
    conn_data = try_to_connect()
    npm.action.task_data['ok'] = conn_data['ok']
    npm.action.task_data['pre_logs_msg'] = conn_data['pre_logs_msg']
    npm.action.task_data['logs'] = npm.action.task_data['logs'] + conn_data['logs']
  
  except Exception as npm_connection_attempt_error:
    _add_and_log( npm.action.task_data['logs'], [ wrap_text( f'''🤕 ALKiP ERROR: ALKiP internal development error when trying to connect to npm.'''), format_error( npm_connection_attempt_error ) ])
    npm.action.task_data['ok'] = False

  # ------------- Complete fully -------------
  background_response( npm.action.task_data )
