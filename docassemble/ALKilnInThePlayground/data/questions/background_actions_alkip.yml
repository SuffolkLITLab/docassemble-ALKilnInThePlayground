# Background action: Logic (installing alkiln)
id: install alkiln background action
event: install_alkiln
need:
  - _debug
  - _add_and_log
  - format_error
  - worker_log_link
  - has_started_alkiln_install
  - run_process_with_canceler
  - install_alkiln_bash_file
  - made_npm_dir_successfully
  - install.action.task_data
  - install.action.cancel_key
code: |
  # Discuss: How do we detect if someone _else_ on the server didn't properly finish installing ALKiln and that there will be cache problems?
  
  background_error_action('fail_install_action')

  kip_session_path = action_argument('kip_session_path')

  general_err_log = f"""🤕 ALKiP ERROR: ALKilnInThePlayground ran into an error when
  it was trying to install ALKiln. Look above for more details
  and check your { worker_log_link }."""

  install_start_ok = True
  if not made_npm_dir_successfully:
    install_start_ok = False

  # Run install only once
  if has_started_alkiln_install:
    # Examples: ALKiP devs forgot to define a var before running, so the task got retriggered
    install_start_ok = False
    install.action.task_data['repeated'] = True
    _add_and_log( install.action.task_data['logs'], [f"""ALKilnInThePlayground tried to re-run the `install_alkiln` task. This may be an internal ALKilnInThePlayground problem. Look in your { worker_log_link } for more clues."""] )

  if not install_start_ok:
    # @@@TODO: Stop subprocess if already running. Operations are synchronous, but The Loop isn't. Basically, set cancel and we may need to add another flag. Better to let it finish running?
    install.action.task_data['ok'] = False
    _add_and_log( install.action.task_data['logs'], [ general_err_log ])
    background_response( install.action.task_data )

  # Must install with npm version, not GitHub branch as we don't know a simple way to get the
  # npm version from the branch installation (to help the user install the right version) or,
  # alternatively, avoid installing anything unnecessary. On GitHub, though, we hope to use
  # the branch or commit as the source of truth for our version. This unfortunately means
  # there can't be just one source of truth for which version of ALKiln a server is using.
  
  # =====================
  # Run the install
  # =====================

  install_process_data = {}
  to_run = [
    'bash', install_alkiln_bash_file.path(),
    '@suffolklitlab/alkiln', action_argument('version')
  ]
  
  try:
    has_started_alkiln_install = True
    install_process_data = run_process_with_canceler(
      to_run,
      cancel_key=install.action.cancel_key,
      json_path=kip_session_path,
      descriptor="install ALKiln",
      max_seconds=float( 60 * 2 ),
      custom_env_vars=dict( NPM_CONFIG_PREFIX="/var/www/.npm-global" )
    )
  
    _debug(f'''🐛 ALKiP INFO: Finished installing ALKiln''')
    install.action.task_data['logs'].extend( install_process_data.get('logs', []) )

  except Exception as install_process_error:
    _add_and_log( install.action.task_data['logs'], [ format_error( install_process_error ), general_err_log ])

  install.action.task_data['ok'] = install_process_data.get('ok', False)
  install.action.task_data['interrupted'] = install_process_data.get('interrupted', False)
  
  background_response( install.action.task_data )
