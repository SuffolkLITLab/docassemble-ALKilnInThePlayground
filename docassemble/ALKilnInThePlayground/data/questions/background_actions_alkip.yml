    if name.endswith('.txt'):
      html = f'''<li class='text_file'>
      <a target='_blank' href='{da_file.url_for()}'>{ name } <i class='fas fa-external-link'></i></a>
    </li>
    '''
    else:
      # Assumes a file that can be shown with a thumbnail image
      da_file.set_alt_text(f'The thumbnail image for { name }.')
      html = f'''<li class='thumbnail'>
        <span><span>{ name }</span> (<a target='_blank' href='{ da_file.url_for() }'>tap to see file <i class='fas fa-external-link'></i></a>)</span>
        <div><a target='_blank' href='{ da_file.url_for() }'>{ da_file }</a></div>
      </li>
    '''
    
    return html
---
