# Discuss: Should `.wait` belong to `.ui` or `.action`? Maybe `.ui` should be kept for definitely persistent values. Maybe it should be called `.persistent`
# Discuss: Should all screens be in the main file?
id: npm html wait screen
event: npm.action.wait
prevent going back: True
reload: 5
question: |
  :plug: One sec, checking the connection to the servers that store ALKiln
subquestion: |
  <div class="spinner-container d-flex justify-content-center">
  <div class="spinner-border" role="status">
    <span class="visually-hidden">Checking for ALKiln package...</span>
  </div>
  </div>
  
  This is supposed to take no more than about 15 seconds.

  In future, ALKiln developers plan to change the order of these operations so that you will have the option to go straight to running your tests.

  :clock: **Elapsed time: ${ str(date_difference( ending=current_datetime(), starting=npm.action.start_time ).delta) }**[BR]
  (Updates about every 5 seconds depending on your server speed)
