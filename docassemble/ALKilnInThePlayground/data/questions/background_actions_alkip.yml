# Action-needed values: Dynamic (npm connection)
---
id: check npm connection works
need:
  - _add_and_log
  - format_error
  - wrap_text
code: |
  import requests
  import traceback

  def try_to_connect(url: str = "https://registry.npmjs.org/", timeout: float = 5.0):
    """
    Perform a GET request that times‑out after `timeout` seconds. Return
    dict with info about connection attempts.

    TODO: try using npm ping. Would it raise an error on 500s, etc?

    Args:
        url (str): url to try to reach
        timeout (float): Maximum time allowed for the request

    Returns:
      dict {
        'ok' (bool): True if ran into an error.
        'logs' ([str]): List of logs to show in the console.
        'pre_log_msg' (str): Text to show in a paragraph before the logs.
      }
    """

    connection_data = { 'ok': False, 'logs': [], 'pre_logs_msg': '' }
    connection_data['pre_logs_msg'] = 'ALKilnInThePlayground was unable to connect to the servers that store ALKiln.'
  
    try_later = 'To install any ALKiln version you might have to try again later.'
    we_cant_help = 'The ALKiln team is unable to help with this problem.'
  
    try:
      response = requests.get(url, timeout=timeout)
      response.raise_for_status()
      connection_data["ok"] = response.ok
      connection_data['pre_logs_msg'] = "ok"
  
    except requests.exceptions.ConnectionError as conn_err:
      # Alt: This server isn't connected to the internet or there is some
      #     other connection problem
      # Discuss: More detailed explanations have more info, but are a
      #     possible rabbit hole for the authors:
      #     'ALKiln is stored on a third-party server that we trust, npmjs.'
      connection_data['pre_logs_msg'] = f'ALKilnInThePlayground is unable to connect to the server where ALKiln is stored. { we_cant_help } { try_later }'
      _add_and_log( connection_data['logs'], [
        wrap_text( f'''🤕 ALKiP ERROR: npmjs ConnectionError. ALKilnInThePlayground is unable to connect to the servers where ALKiln is stored. The author's docassemble server might be disconnected from the internet, npmjs' server may be unavailable, or something else may be wrong. { we_cant_help } { try_later } Stacktrace:'''),
        format_error( conn_err )
      ])

    except requests.exceptions.HTTPError as http_err:
      if response.status_code >= 400 and response.status_code < 500:
        connection_data['ok'] = False
        connection_data['pre_logs_msg'] = f'ALKilnInThePlayground sent an incorrect request to the servers that store ALKiln and got a { response.status_code } response code. Please get in touch with the ALKiln developers.'
        _add_and_log( connection_data['logs'], [ wrap_text( f'''🤕 ALKiP ERROR: { connection_data['pre_logs_msg'] }'''), format_error( http_err ) ])
  
      if response.status_code >= 500 and response.status_code < 600:
        connection_data['ok'] = False
        connection_data['pre_logs_msg'] = f'The servers that store the ALKiln package were unavailable. ALKilnInThePlayground got a { response.status_code } response code. { try_later }'
        _add_and_log( connection_data['logs'], [ wrap_text( f'''🤕 ALKiP ERROR: { connection_data['pre_logs_msg'] }'''), format_error( http_err ) ])
      
  
    except requests.RequestException as req_err:
      connection_data['pre_logs_msg'] = 'ALKilnInThePlayground ran into a "RequestException" error when it tried to connect to the server that stores the ALKiln package. { try_later }'
      _add_and_log( connection_data['logs'], [
        wrap_text( f'''🤕 ALKiP ERROR: { connection_data['pre_logs_msg'] } Stacktrace:'''),
        format_error( req_err )
      ])
  
    except Exception as general_err:
      connection_data['pre_logs_msg'] = f'ALKilnInThePlayground ran into a "{ type( general_err ).__name__ }" error when it tried to connect to the server that stores the ALKiln package. { try_later }'
      _add_and_log( connection_data['logs'], [
        wrap_text( f'''🤕 ALKiP ERROR: { connection_data['pre_logs_msg'] } Stacktrace:'''),
        format_error( general_err )
      ])

    return connection_data
