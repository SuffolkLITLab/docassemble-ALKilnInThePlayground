id: ensure dirs and filepaths exist
code: |
  from pathlib import Path
  import os

  def ensure_dir_exists( dir_path ):
    """
    Creates directory if it doesn't exist. Otherwise leaves it alone. Returns the Path object of the dir path.
    """
    dir_Path = None
    if dir_path:
      dir_Path = Path( dir_path )
      dir_Path.mkdir( parents=True, exist_ok=True )
    return dir_Path
  
  def ensure_file_exists( filepath, default_value="" ):
    """
    Creates file if it doesn't exist. Otherwise leaves it alone. Returns the Path object of the filepath. If the file is empty, ensure the file contains default_value.

    Args:
      filepath (str): The whole path to the file
      default_value (str): A value to give the file if the file is empty

    Returns:
      (obj):
        path (str): The file path given to this function.
        contents (str): The contents of the file by the end of the operation.
        previous_contents (str): The contents of the file when this function first read the file.
    """
    ensure_dir_exists( os.path.dirname( filepath ) )
  
    file_Path = None
    contents = None
    previous_contents = None
    if filepath:
      file_Path = Path( filepath )
      with open( file_Path, "a+") as file:
        file.seek(0)
        previous_contents = file.read()
        contents = previous_contents
        if default_value != "" and contents == "":
          file_Path.write_text( str( default_value ))
          contents = default_value
    return {
      "path": file_Path,
      "contents": contents,
      "previous_contents": previous_contents
    }
