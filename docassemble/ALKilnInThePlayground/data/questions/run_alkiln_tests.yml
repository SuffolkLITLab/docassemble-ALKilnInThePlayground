    """
    # @@@ TODO: Put these comments somewhere better
    Invalid ALKiln version notes: There are 3 ways in which an ALKiln installation can be invalid.
    1. Invalid: `server_alkiln_version` can fail (the first time this package runs on a server, among other reasons). Must install to resolve.
    2. Invalid: `install.ui.failed`. Must install to resolve.
