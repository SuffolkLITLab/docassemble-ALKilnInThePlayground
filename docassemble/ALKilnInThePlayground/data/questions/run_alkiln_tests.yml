template: avoid_stopping_install_warning
content: |
  While ALKiln is installing **try very hard to avoid**:

  - Cancelling the installation
  - Saving a python module
  - Pulling or uploading a package with a python module
  - Otherwise causing this server to reload, restart, or stop

  Stopping in the middle might cause an invalid installation. If that happens, you will most likely have to clean up the invalid installation, which can sometimes be troublesome.

  Instead, you can wait till the installation finishes and then install a different version.
