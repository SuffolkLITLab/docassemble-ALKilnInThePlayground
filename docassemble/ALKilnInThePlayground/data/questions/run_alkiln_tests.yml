  # ------------- Failure fallback -------------
  background_error_action("fail_artifacts_action")

  # ------------- Default values -------------
  arts_general_err_log = f"""🤕 ALKiP ERROR: ALKilnInThePlayground ran into an error when
  it was trying to get the test artifacts. Look above for more details and
  check your { worker_log_link }."""

  artifacts.action.task_data['result'] = {}

  # ------------- Guard the action -------------
  if artifacts.action.did_start:
  
    _add_and_log( artifacts.action.task_data['logs'], [f"""🔎 ALKiP WARNING: Tried to re-run the ALKiln { artifacts.ui.description } task. Docassemble was seeking `{ current_context().variable }`. Your { worker_log_link } may have more info."""])
    artifacts.action.task_data['ok'] = False
    artifacts.action.task_data['repeated'] = True
    background_response( artifacts.action.task_data )
  
  artifacts.action.did_start = True

  # ------------- Run -------------
  try:
    if folder_path == None:
      artifacts.action.task_data['result'] = {
        'html': '',
        'outcome': None,
        'file_problem': True,
      }
    else:
      tests_data = get_files_html( folder_path )
      artifacts.action.task_data['result'] = {
        'html': tests_data['html'],
        'outcome': tests_data['outcome'],
        'file_problem': False,
      }
    artifacts.action.task_data['ok'] = True
  
  except Exception as artifacts_func_err:
    _add_and_log( artifacts.action.task_data['logs'], [ format_error( artifacts_func_err ), arts_general_err_log ])
    artifacts.action.task_data['ok'] = False

  # ------------- Complete fully -------------
  background_response( artifacts.action.task_data )
