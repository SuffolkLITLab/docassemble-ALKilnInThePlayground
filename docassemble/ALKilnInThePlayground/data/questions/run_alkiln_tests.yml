    _add_and_log( removal_logs, f'🖊️ NOTE ALKP0009: skipped removing "{ folder_path }".')
    _add_and_log( removal_logs, format_error( remove_artifacts_error ))

  # TODO: Research whether we're deleting the connections of all server devs
  # https://stackoverflow.com/a/32949415/14144258
  import glob
  try:
    # Remove leftover puppeteer stuff if it exists (e.g. if the user
    # stopped the tests early)
    # https://github.com/puppeteer/puppeteer/issues/6414
    # TODO: Check if handling background actions correctly
    # prevents extra chrome processes from sticking around,
    # letting us remove this potentially problematic code
    removal_sub_folders_list = glob.glob('tmp/puppeteer_dev_chrome_profile*')
    for sub_folder in removal_sub_folders_list:
      shutil.rmtree(sub_folder)
  except Exception as clean_puppeteer_error:
    _add_and_log( removal_logs, f'🖊️ NOTE ALKP: skipped removing puppeteer leftovers. Maybe there were none. Message, if any:')
    _add_and_log( removal_logs, format_error( clean_puppeteer_error ))

  removal_delete_session_dir_data = delete_kip_session_dir()
  _add_and_log( removal_logs, removal_delete_session_dir_data.get('logs', []) )

  remove_tmp_files = True
