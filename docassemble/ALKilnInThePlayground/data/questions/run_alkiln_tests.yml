id: run must-succeed task
generic object: DAObject
if:
  not x.action.continue_on_failure
need:
  - x.ui.description
code: |
  if x.action.phase in ('before'):
    x.action.set_initial_state

  if not x.action.task.ready():
    x.action.wait

  x.action.end_time
  # .get() is None with a failed task
  x.ui.data = x.action.task.get() or {}
  # Discuss: Where along the way should we join the logs? Too early here?
  x.ui.logs = '\n'.join( x.ui.data.get('logs', [f'🤕 ALKiP ERROR: The { x.ui.description } background action errored. { logs_more_info }']) )

  # Consider handling `interrupted` and `repeated` here

  if ( x.action.phase != 'failed' and (
        x.action.task.failed() or not x.ui.data['ok']
  )):
    x.action.fail
  # Discuss: Tell the user about just cancellation, just other failure, or both?
  if x.ui.cancelled or x.ui.failed:
    # Discuss: Log logs?
    x.action.undefine

  # Block the `succeed` event from running infinitely
  # Note: When an event block finishes, da doesn't re-run logic.
  # If it did, this block would cause a concurrency lock timeout
  # issue because of the `.succeeded` event causing the main loop
  # to skip running this block. I think.
  elif x.action.phase != 'succeeded':
    x.action.succeed

  x.action.run = True
---
