template: test_run_outcome_template
need:
  - tests.ui.cancelled
content: |
  % if tests.ui.cancelled:
  % if tests.action.interrupted == True:
  <aside class="alert alert-secondary" markdown="1">
  Note: You stopped the tests early. Below is the information the tests collected so far.
  </aside>
  % elif tests.action.interrupted == False:
  <aside class="alert alert-secondary" markdown="1">
  Note: You tried to stop the tests early, but the tests were already done.
  </aside>
  % endif
  % endif

  % if tests.action.interrupted is None:
  <header class="no_values alert alert-warning" style="max-height: unset;">
    <h2>🌀 Hmm, something unexpected happened</h2>
    <p style="margin: 0;">
    This one's a toughie. We do not have ways to deal with this kind of problem yet. There might be more information below.
    </p>
  </header>
  % elif test_run_outcome == 'failed':
  <header class="tests_failed alert alert-danger" style="max-height: unset;">
    <h2 style="margin: 0;">🤕 Sorry, some tests failed</h2>
  </header>
  % elif test_run_outcome == 'passed':
  <header class="tests_passed alert alert-info" style="max-height: unset;">
    <h2 style="margin: 0;">💡 Tests finished, none failed</h2>
  </header>
  % elif test_run_outcome == 'unexpected':
  <header class="tests_unexpected alert alert-warning" style="max-height: unset;">
    <h2>🌀 Hmm, something unexpected happened</h2>
    <p style="margin: 0;">
    This one's a toughie. ALKilnInThePlayground cannot recognize this kind of problem yet. There might be more information below.
    </p>
  </header>
  % else:
  <header class="tests_unknown alert alert-warning" style="max-height: unset;">
    <h2 style="margin: 0;">🌀 Hmm, something unexpected happened</h2>
    <p style="margin: 0;">
    The outcome of the tests was unclear to ALKilnInThePlayground. There might be more information below.
    </p>
  </header>
  % endif
---
code: |
  test_run_outcome = None
---
