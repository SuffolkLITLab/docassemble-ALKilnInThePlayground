code: |
  # TODO: Ensure this block runs regardless of the outcome just in case it
  # can manage to clean something up. Avoid erroring. These steps aren't
  # crucial.

  removal_logs = []

  _add_and_debug( removal_logs, "💡 INFO ALKP: Removing original artifacts files" )

  import os
  if not deleted_artifacts_zip_path:
    try:
      os.remove( artifacts_zip_path_original )
    except Exception as remove_zip_error:
      _add_and_log( removal_logs, f'🖊️ NOTE ALKP0008: skipped removing old "{ artifacts_zip_path_original }".')
      _add_and_debug( removal_logs, format_error( remove_zip_error ))
  # Avoid repeating removing artifacts zip path
  deleted_artifacts_zip_path = True

  import shutil
  if folder_path:
    try:
      shutil.rmtree( folder_path )
    except Exception as remove_artifacts_error:
      _add_and_log( removal_logs, f'🖊️ NOTE ALKP0009: skipped removing "{ folder_path }".')
      _add_and_debug( removal_logs, format_error( remove_artifacts_error ))
  folder_path = None

  # TODO: Research whether we're deleting the connections of all server devs
  # https://stackoverflow.com/a/32949415/14144258
  import glob
  try:
    # Remove leftover puppeteer stuff if it exists (e.g. if the user
    # stopped the tests early)
    # https://github.com/puppeteer/puppeteer/issues/6414
    # TODO: Check if handling background actions does correctly
    # prevent extra chrome processes from sticking around,
    # letting us remove this potentially problematic code
    removal_sub_folders_list = glob.glob('tmp/puppeteer_dev_chrome_profile*')
    for sub_folder in removal_sub_folders_list:
      shutil.rmtree(sub_folder)
  except Exception as clean_puppeteer_error:
    _add_and_log( removal_logs, f'🖊️ NOTE ALKP: skipped removing puppeteer leftovers. Maybe there were none.')
    _add_and_debug( removal_logs, format_error( clean_puppeteer_error ))

  try:
    removal_delete_session_dir_data = delete_kip_session_dir()
  except Exception as remove_kip_session_files_err:
    _add_and_log( removal_logs, f'🖊️ NOTE ALKP: skipped removing ALKilInThePlayground session vars file. Maybe there was none.')
    _add_and_debug( removal_logs, [
      removal_delete_session_dir_data.get('logs', []),
      format_error( remove_kip_session_files_err )
    ])

  remove_tmp_files = True
