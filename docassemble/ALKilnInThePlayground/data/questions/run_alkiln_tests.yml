id: set the version number of alkiln
need:
  - da_log_more_info
  - _debug
  - nice_time
code: |
  import subprocess
  import re

  # https://stackoverflow.com/a/13332300
  # npm list -g --prefix /var/www/.npm-global --depth 0 -p -l
  packages = subprocess.run(['npm', 'list', '@suffolklitlab/alkiln', '-g', '--prefix', '/var/www/.npm-global', '--depth', '0', '-p', '-l'], check=False, capture_output=True)
  # What would cause an error here?
  if packages.returncode != 0:
    _debug('🤕 ALKiP ERROR ALKP0003: Error getting this server\'s currently installed ALKiln version:')
    _debug(f'Error code: { packages.returncode }')
    _debug( f"stderr: { packages.stderr.decode("utf-8") }" )
    server_version = f"Could not get this server's version of ALKiln. ALKilnInThePlayground got an error instead. { da_log_more_info }"
  
  else:
    _debug('Setting server_alkiln_version')
    _debug(packages.stdout.decode())
    pattern = re.compile(r'suffolklitlab/alkiln@(\d.*)$')
    matches = re.search(pattern, packages.stdout.decode())
    # Discuss: Should `if matches == None:` be an error path?
    if matches == None:
      server_version = "Could not get this server's version of ALKiln. It seems to be missing. Install a version of ALKiln to continue."
    else:
      server_version = matches.group(1)
      
      del matches  # cannot pickle error otherwise

  server_alkiln_version = server_version
