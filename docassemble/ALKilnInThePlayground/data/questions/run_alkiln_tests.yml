code: |
  import subprocess
  
  def make_and_get_artifacts_zip_downloader():
    """
    Returns:
        str: the zip download button HTML for the artifacts folder
    """

    # _debug(300)
    zip_not_found_html = f"""
        <div class="alkiln_error alert alert-warning">ALKilnInThePlayground was unable to create a zip file for the test artifacts. Sorry about that. You might find more clues on this page. { da_log_more_info }</div>\n
      """

    # _debug(300.1)
    if zip_name == None:
      # _debug(301)
      return zip_not_found_html

    _debug(f"""💡 ALKiP INFO: will try to get the artifacts zip from "{ folder_path }" (in "{ root_path }") and save the artifacts zip with the name "{ zip_name }".""" )

    # TODO: Remove zip_name_no_ext if possible. `zip` cmd doesn't need it.

    zipping_did_error = False
    try:
  
      # cwd controls where the expanded zip's path starts. Every folder beyond
      # the cwd location will show up in the output of expanding the zip.
      # zip_name_no_ext ex: "the_zip"
      # folder_path ex: "/tmp/the_folder"
      zip_process = subprocess.run(['zip', '-rv', zip_name_no_ext, folder_name ], cwd=root_path, check=False, capture_output=True)

      # Folder path was fine, but unable to make zip
      if zip_process.returncode != 0:
        zipping_did_error = True
        returncode = zip_process.returncode

        if returncode == 12:
          _log( f'🤕 ALKiP ERROR: when trying to zip the artifacts folder at "{ folder_path }" in cwd "{ root_path }", the zip command was unable to find the file or directory. Return code "{ zip_process.returncode }" ("zip has nothing to do").' )
        elif returncode == 15:
          _log( f'🤕 ALKiP ERROR: when trying to zip the artifacts folder at "{ folder_path }" in cwd "{ root_path }", the zip command was unable to create a file to write to. Return code "{ zip_process.returncode }".' )
  
        else:
          _log( f'🤕 ALKiP ERROR ALKP0007: error running `zip` command to zip the artifacts folder at "{ folder_path }" in cwd "{ root_path }" with return code "{ zip_process.returncode }". stderr:' )
          _log( zip_process.stderr.decode( "utf-8" ))

    except FileNotFoundError as zip_process_error:
      zipping_did_error = True
      _log( f'🔎 ALKiP WARNING: could not find the artifacts folder at dir "{ folder_path }" in cwd "{ root_path }":' )
      import traceback
      _log("\n".join( traceback.format_exception( zip_process_error ) ))
      
    except Exception as zip_process_error:
      zipping_did_error = True
      _log( f'🤕 ALKiP ERROR: subprocess errored when ALKilnInThePlayground tried to zip the artifacts folder at dir "{ folder_path }" in cwd "{ root_path }":' )
      import traceback
      _log("\n".join( traceback.format_exception( zip_process_error ) ))

    if zipping_did_error:
      return zip_not_found_html
  
    zip_path = get_artifacts_zip_path()["path"]
  
    if zip_process.stdout:
      saved_artifacts_zip = True
      _debug(f"""💡 ALKiP INFO: saved the artifacts zip file correctly to "{ zip_path }". stdout:""")
      _debug( zip_process.stdout )

    zip_da_file = DAFile()
    zip_da_file.initialize( filename=zip_name )
    zip_da_file.copy_into( zip_path )
    zip_da_file.commit()
  
    return f"""
        <menu>{ action_button_html(zip_da_file.url_for(), label="Download all files and folders that ALKiln created", color="primary", size="md", icon="file-zipper", new_window=True, classname="zip") }</menu>
    """
