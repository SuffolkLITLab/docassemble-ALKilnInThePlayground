code: |
  def delete_kip_session_dir( filepath=None ):
    """
    Try to delete the ALKiP session folder.

    Discuss: Use an argument instead of vars?
  
    Returns:
      dict:
        ok (bool): False if there was an error. Else True.
        logs ([str]): Any messages about the operation.
    """
    import shutil

    logs = []
    filepath = filepath or f'{ root_path }/{ alkiln_session_id }'
  
    try:
      # Remove ALKiP session vars file
      shutil.rmtree( filepath )
      _add_and_debug( logs, [f'🐛 INFO ALKP: Removed { filepath }'])
  
    except Exception as delete_session_dir_error:
      message1 = f'🖊️ NOTE ALKP: skipped removing session variables file at "{ root_path }/{ alkiln_session_id }".'
      message2 = format_error( delete_session_dir_error )
      _add_and_debug( logs, [ message1 ])
      _add_and_debug( logs, [ message2 ])
      return { "ok": False, "logs": logs }
  
    return { "ok": True, "logs": [] } 
