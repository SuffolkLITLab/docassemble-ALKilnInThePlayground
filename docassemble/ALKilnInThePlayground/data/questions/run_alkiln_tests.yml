  import os
  
  def get_any_console_html( contents, unique_name, descriptor="ALKiln tests" ):
    """
    Returns HTML of the tests' console output section with copyable text.

    Discuss: Descriptor unique enough for HTML id?
    TODO: Find and emulate more robust replacement of `<a`. In doctor?

    Args:
      contents (str): Text to show in the console
