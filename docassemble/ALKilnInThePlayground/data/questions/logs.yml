code: |
  def _log( to_log, where='log' ):
    """
    Logs `to_log` to the desired location and the console. Silences exceptions. 

    Args:
        to_log (str): Message to log.
        where (str): A valid 2nd argument to docassemble `log()`. Ex: 'console'
    """
    try:
      log( to_log, where )
      if where != 'console':
        if debugging:
          log( to_log, 'console' )
    except Exception as error_while_logging:
      _debug('🖊️ ALKiP NOTE: Errored when trying to use _log.')
      _debug( format_error( error_while_logging ))
      pass
    return to_log
