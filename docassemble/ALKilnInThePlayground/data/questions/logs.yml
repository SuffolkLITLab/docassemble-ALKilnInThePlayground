id: string of wrapped text
code: |
  import textwrap
  def wrap_text( items, width=45 ):
    """
    Returns string or list of strings as one string with new line chars
      at or before every `width` number of characters.

    Args:
      items (str|[str]): String or list of strings.
      width (int): Number of characters at which to wrap.

    Returns:
      (str): A string with linebreaks at or before every `width` number of
        characters.
    """
    if not items:
      return items
    if type(items) != list:
      items = [ items ]

    all_wrapped = []
    # For now, avoid fully expanding
    for one_string in items:
      all_wrapped.append('\n'.join( textwrap.wrap( one_string, width=45 ) ))

    return '\n'.join( all_wrapped )
