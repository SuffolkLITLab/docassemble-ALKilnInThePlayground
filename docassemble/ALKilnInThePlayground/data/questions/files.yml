  def get_kip_runtime_val( kip_config_key, source_path ):
    """
    Args:
      (str): The name of the alkip config key
    Returns:
      str|None: The value or None if value doesn't exist
    """
    log(f"getting vars at source_path: { source_path }")
    kip_config_value = get_one_json_file_var( source_path, kip_config_key )["result"]
    _debug(f"""kip_config_value of { kip_config_key }: { kip_config_value }""")
    return kip_config_value
