id: save any alkip runtime var
need:
  - ensure_file_exists
  - _debug
code: |
  from pathlib import Path
  import json
  import traceback
  
  def save_kip_runtime_vars( new_data, target_path ):
    """
    Set or overwrite values in the ALKiP runtime values as json. Return info
      about what happened. Discuss: Return all config vars?
  
    Args:
      new_data (dict(any)): Key/value pairs to add to or replace the runtime vars
      target_path (str): Path to target file

    Returns:
      dict:
        ok (bool): True if succeeded, False if failed.
        message (str): Information. If failed, text of what went wrong.
        result ({*} | None): The current runtime vars.
    """
    kip_runtime_json = None

    log(f"setting vars at target_path: { target_path }")
  
    runtime_filepath = ensure_file_exists( target_path, default_value="{}" )["path"]
    file_already_exists = True
    runtime_vars_str = None

    try:
      with open( runtime_filepath, "r" ) as runtime_file:
        runtime_file.seek(0)
        runtime_vars_str = runtime_file.read()
        _debug(f"ALKiP: prev runtime_vars_str: { runtime_vars_str }")
        file_already_exists = True

    except FileNotFoundError as kip_vars_notfound_error:
      try:
        kip_runtime_json = new_data
        runtime_filepath.write_text(json.dumps( new_data ))

      except Exception as write_new_kip_vars_error:
        message = f"""Skipped writing new ALKiP vars json file: {"\n".join( traceback.format_exception( write_new_kip_vars_error ) )}"""
        log(f"""🖊️ ALKiln NOTE: { message }""")
        return { "ok": False, "message": message, "result": None }

    except Exception as kip_vars_read_error:
      message = f"""Skipped reading ALKiP vars json file: {"\n".join( traceback.format_exception( kip_vars_read_error ) )}"""
      log(f"""🖊️ ALKiln NOTE: { message }""")
      return { "ok": False, "message": message, "result": None }

    if file_already_exists:
      try:
        kip_runtime_json = json.loads( runtime_vars_str )
        kip_runtime_json.update( new_data )
        runtime_filepath.write_text(json.dumps( kip_runtime_json ))

      except Exception as kip_vars_edit_error:
        message = f"""Skipped editing ALKiP vars json file: {"\n".join( traceback.format_exception( kip_vars_edit_error ) )}"""
        log(f"""🖊️ ALKiln NOTE: { message }""")
        return { "ok": False, "message": message, "result": None }

    log(f"current kip_runtime_json: { kip_runtime_json }")
    return { "ok": True, "message": "", "result": kip_runtime_json }
