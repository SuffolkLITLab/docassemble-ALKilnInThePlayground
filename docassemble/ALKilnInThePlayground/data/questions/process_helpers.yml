code: |
  import os
  import signal
  
  def terminate( process ):
    '''
    Terminate a process group. Note: Avoiding process.terminate() because that
      method only terminates the outermost process, not the process group.

    Args:
      process (subprocess.Popen)
    '''
    try:
      # returncode -15
      os.killpg( os.getpgid( process.pid ), signal.SIGTERM )
      process.wait( timeout=1 )  # Have to wait after stopping for some reason
  
    except OSError as already_terminated_error:
      # An already terminated process is a happy process. Consider `ProcessLookupError` more specifically, though
      pass
    except Exception:
      # Discuss: Add logs and `ok` flag? Why?
      pass
  
    # Discuss: Add error indicators if `.poll()` is None? Why?
