code: |
  import traceback
  import os
  import signal
  
  def kill( process, caller ):
    '''
    Make sure subprocess and its children are completely stopped. Use a
    low-level interface. Why? One example: `.communicate` times out and
    the system doesn't complete the process. Research: How would `with`
    handle that situation?
  
    Research: Must the process always have been created with
    `start_new_session` for `os.getpid()` to work?
  
    Args:
      process (subprocess.Popen): Python subprocess, either open or closed
      caller (str): Which part of the process lifecycle called this
  
    Returns:
      dict:
        ok (bool): True if ran into error-like behavior
        logs ([ str ]): Messages about what happened
    '''
    ok = True
    logs = []
  
    try:
      if process.poll() is not None:
        return { 'ok': True, 'logs': [] }
  
      if process.pid != None:
        # returncode -9
        os.killpg( os.getpgid( process.pid ), signal.SIGKILL )
        process.wait(timeout=0.5)  # Have to wait after stopping for some reason
      else:
        ok = False
        no_pid = f'''🤕 ERROR ALKP: The process ID is missing. Look above to identify the process and get in touch with us. If you want to experiment, in the past this problem has been caused by a value in the server config under the `alkiln` key that has a non-string value. It often comes with a message similar to "expected str, bytes or os.PathLike object, not bool".'''
        log( no_pid )
        logs.append( no_pid )
  
    except OSError as already_terminated_error:
      # An already terminated process is a happy process. Consider `ProcessLookupError` tho
      pass
  
    except subprocess.TimeoutExpired:
      # We tried our best. Discuss: Do we need the log? Why?
      timeout_msg = f'''🤕 ERROR ALKP: The process with the ID { process.pid } timed out when we tried to kill it.'''
      log( timeout_msg )
      logs.append( timeout_msg )
  
    except Exception as kill_process_error:
      # Discuss: re-raise instead?
      ok = False
      msg1 = f'''🤕 ERROR ALKP ALKP0011: Error while killing process:'''
      log( msg1 )
      msg2 = '\n'.join( traceback.format_exception( kill_process_error ) )
      log( msg2 )
      logs.extend([ msg1, msg2 ])
  
    return { 'ok': ok, 'logs': logs }
  