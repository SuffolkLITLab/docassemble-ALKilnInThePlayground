---
features:
  css:
    - alkiln_playground.css
    - alkip_resets.css
---
id: path to danger
event: potentially_dangerous_actions
question: Do possibly risky things
subquestion: |
  This is a page for advanced actions. The actions you can take here have a small risk of causing problems. Some delete files and folders.
  
  The concepts here can be complex to understand and the interface is still primitive. We will continue to work on clarifying the interface, what these actions do, and how you can be most sure of success.
  
  ## Clean up an invalid ALKiln installation

  Before you continue, make sure you have an internet connection and make sure no one else is running ALKiln tests.
  
  ${ action_button_html(url_action( "uninstall_alkiln" ), classname="alk_resets_button", label="Gently uninstall the ALKiln npm package", color="warning") }
  
  If that doesn't work, your last resort is to [prepare to delete the folder containing the ALKiln package, along with any other packages in that folder](${ url_action( "alkiln_installation_problems" ) }).

  ## Other actions

  Delete the `/tmp/runtime_config.json` file. It is a file ALKiln uses to keep track of its environment and it can become corrupted. Deleting it can affect currently running tests.
  
  ${ action_button_html( url_action("delete_config"), classname="alk_resets_button", label="Delete /tmp/runtime_config.json", color="warning") }
---
# ==================
# Delete /tmp/runtime_config.json
# ==================
---
id: remove runtime config
event: delete_config
code: |
  import pathlib
  try:
    pathlib.Path.unlink("/tmp/runtime_config.json", missing_ok=True)
    failed = False

  except Exception as delete_runtime_config_err:
    failed = True
    log(f"""{"\n".join(([ "🤕 ALKiP ERROR: Failed to delete /tmp/runtime_config.json. Get in touch. More info (if available):" ] + traceback.format_exception( delete_runtime_config_err )) )}""", "danger")

  if not failed:
    log(f"""💡 ALKiP INFO: No errors when deleted /tmp/runtime_config.json""", "info")
---
# ==================
# Uninstall global alkiln npm package
# ==================
---
objects:
  - uninstall_alkiln_bash: DAStaticFile.using(filename="data/sources/uninstall_global_npm_package.sh")
---
id: uninstall global alkiln npm package
event: uninstall_alkiln
need:
  - uninstall_alkiln_bash
code: |
  import traceback
  import subprocess
  import os

  try:
    to_run = [
      "bash", uninstall_alkiln_bash.path(),
      "@suffolklitlab/alkiln"
    ]
    process = subprocess.run( to_run, env=dict( os.environ, NPM_CONFIG_PREFIX="/var/www/.npm-global" ), timeout=60, check=True)
    failed = False

  except Exception as uninstall_error:
    failed = True
    msg = f"""{"\n".join(([ "🤕 ALKiP ERROR: Failed to uninstall ALKiln. Try following the link to delete the folder containing ALKiln. More info (if available):" ] + traceback.format_exception( uninstall_error )) )}"""
    log( msg )
    log( msg, "danger" )

  if not failed:
    log(f"""💡 ALKiP INFO: No errors when ran uninstall""", "info")
---
