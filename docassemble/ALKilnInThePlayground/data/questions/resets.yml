id: prepare for pressing the button
template: prepare
content: |
  make sure everyone stops using those packages before pressing the button. After you press the button everyone will have to re-install the packages that they need.
---
id: remove node_modules
event: dangerously_delete_node_modules
code: |
  import shutil
  import traceback

  msg_before = "🔎 ALKiP WARNING: Now deleting /var/www/.npm-global/lib/node_modules. You will have to reinstall any packages you need."
  log( msg_before )
  log( msg_before, "console")
  try:
    shutil.rmtree("/var/www/.npm-global/lib/node_modules")

    msg_success = "💡 ALKiP INFO: No errors when deleted /var/www/.npm-global/lib/node_modules. You will have to reinstall any packages you need."
    log( msg_success )
    log( msg_success, "info")
  except Exception as error_deleting_node_modules:
    err_msg = f"""{"\n".join(([ "🔎 ALKiP WARNING: ALKilnInThePlayground got an error when it tried to delete /var/www/.npm-global/lib/node_modules. More info (if available):" ] + traceback.format_exception( error_deleting_node_modules )) )}"""
    log( err_msg )
    log( err_msg, "warning" )
---
