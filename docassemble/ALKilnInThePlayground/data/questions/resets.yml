question: Delete the `node_modules` folder
subquestion: |
  Pressing the button at the bottom of this page will delete the `/var/www/.npm-global/lib/node_modules` folder. It is your last resort for fixing problems you are having with an installation of ALKiln. It will probably be fine or, at worst, annoying. The questions below can help you make sure you are prepared.

  If your interview ALKiln tests are failing and you think there might be other reasons, a better next step is to discuss your problems with [the docassemble community](https://docassemble.org/docs/support.html#slack) or [SuffolkLITLab's Document Assembly Line](https://assemblyline.suffolklitlab.org/) community before you continue.
